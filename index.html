<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3D 收集大冒险</title>
    <style>
        /* ---------- 全局重置 ---------- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            overflow: hidden;
            background: #0b0e1a;
            font-family: 'Segoe UI', Arial, sans-serif;
            user-select: none;
        }
        canvas {
            display: block;
        }

        /* ---------- 错误提示 ---------- */
        #loading-error {
            position: fixed;
            inset: 0;
            display: none;
            justify-content: center;
            align-items: center;
            background: #0b0e1a;
            color: #ff6b6b;
            font-size: 20px;
            text-align: center;
            z-index: 999;
            padding: 20px;
            flex-direction: column;
        }
        #loading-error.active {
            display: flex;
        }
        #loading-error a {
            color: #7bed9f;
            margin-top: 12px;
        }

        /* ---------- HUD 界面 ---------- */
        #hud {
            position: fixed;
            top: 20px;
            left: 0;
            width: 100%;
            padding: 0 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            pointer-events: none;
            z-index: 10;
            color: #fff;
            font-weight: 600;
            text-shadow: 0 2px 12px rgba(0, 0, 0, 0.7);
        }
        #score {
            font-size: 28px;
            letter-spacing: 1px;
            background: rgba(0, 0, 0, 0.45);
            padding: 10px 24px;
            border-radius: 30px;
            backdrop-filter: blur(6px);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }
        #score span {
            color: #ffd866;
        }
        #status {
            font-size: 20px;
            background: rgba(0, 0, 0, 0.45);
            padding: 10px 24px;
            border-radius: 30px;
            backdrop-filter: blur(6px);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }
        #status .highlight {
            color: #7bed9f;
        }
        #controls-hint {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.5);
            font-size: 14px;
            letter-spacing: 1px;
            background: rgba(0, 0, 0, 0.4);
            padding: 8px 22px;
            border-radius: 30px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            z-index: 10;
            pointer-events: none;
            font-weight: 400;
        }
        #controls-hint kbd {
            display: inline-block;
            background: rgba(255, 255, 255, 0.12);
            padding: 0 10px;
            border-radius: 6px;
            font-family: inherit;
            color: #fff;
            font-weight: 600;
            margin: 0 2px;
        }

        /* ---------- 游戏结束遮罩 ---------- */
        #game-over {
            position: fixed;
            inset: 0;
            display: none;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            z-index: 100;
            flex-direction: column;
        }
        #game-over.active {
            display: flex;
        }
        #game-over .box {
            background: linear-gradient(145deg, #1a1f2e, #0f1320);
            padding: 50px 60px 40px;
            border-radius: 30px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.8);
            max-width: 420px;
            width: 90%;
        }
        #game-over h1 {
            font-size: 48px;
            color: #ff6b6b;
            margin-bottom: 6px;
            letter-spacing: 2px;
        }
        #game-over .sub {
            color: rgba(255, 255, 255, 0.5);
            font-size: 16px;
            margin-bottom: 20px;
            letter-spacing: 1px;
        }
        #game-over .final-score {
            font-size: 36px;
            color: #ffd866;
            font-weight: 700;
            margin: 10px 0 24px;
        }
        #game-over .final-score small {
            font-size: 18px;
            color: rgba(255, 255, 255, 0.4);
            font-weight: 400;
        }
        #restart-btn {
            background: linear-gradient(135deg, #7bed9f, #2ed573);
            border: none;
            color: #0b0e1a;
            font-size: 20px;
            font-weight: 700;
            padding: 14px 50px;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 1px;
            box-shadow: 0 8px 30px rgba(46, 213, 115, 0.35);
            pointer-events: auto;
        }
        #restart-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 12px 40px rgba(46, 213, 115, 0.5);
        }
        #restart-btn:active {
            transform: scale(0.95);
        }

        /* ---------- 胜利状态 ---------- */
        #game-over.win h1 {
            color: #7bed9f;
        }
        #game-over.win .final-score {
            color: #7bed9f;
        }

        /* ---------- 移动端适配 ---------- */
        @media (max-width: 640px) {
            #hud {
                padding: 0 16px;
                top: 12px;
            }
            #score {
                font-size: 20px;
                padding: 6px 16px;
            }
            #status {
                font-size: 16px;
                padding: 6px 16px;
            }
            #game-over .box {
                padding: 30px 24px 30px;
            }
            #game-over h1 {
                font-size: 36px;
            }
            #game-over .final-score {
                font-size: 28px;
            }
            #restart-btn {
                font-size: 17px;
                padding: 12px 36px;
            }
            #controls-hint {
                font-size: 12px;
                padding: 6px 16px;
                bottom: 16px;
                white-space: nowrap;
            }
        }
        @media (max-width: 400px) {
            #controls-hint {
                font-size: 10px;
                padding: 4px 12px;
            }
            #score {
                font-size: 16px;
                padding: 4px 12px;
            }
            #status {
                font-size: 13px;
                padding: 4px 12px;
            }
        }
    </style>
</head>
<body>

    <!-- ====== 加载错误提示 ====== -->
    <div id="loading-error">
        <div>⚠️ Three.js 库加载失败</div>
        <div style="font-size:14px; color:rgba(255,255,255,0.6); margin-top:8px;">
            请检查网络连接，或尝试刷新页面。<br>
            如果问题持续，请查看控制台（F12）错误信息。
        </div>
        <a href="#" onclick="location.reload()">🔄 重新加载</a>
    </div>

    <!-- ====== HUD ====== -->
    <div id="hud">
        <div id="score">⭐ <span id="score-value">0</span></div>
        <div id="status">🎯 <span id="collect-count" class="highlight">0</span> / <span id="total-count">0</span></div>
    </div>

    <div id="controls-hint">
        <kbd>W</kbd> <kbd>A</kbd> <kbd>S</kbd> <kbd>D</kbd> 移动 &nbsp;·&nbsp; <kbd>空格</kbd> 跳跃
    </div>

    <!-- ====== 游戏结束 / 胜利 弹窗 ====== -->
    <div id="game-over">
        <div class="box">
            <h1 id="result-title">💥 游戏结束</h1>
            <div class="sub" id="result-sub">再试一次吧！</div>
            <div class="final-score">
                <span id="final-score">0</span> <small>分</small>
            </div>
            <button id="restart-btn">🔄 重新开始</button>
        </div>
    </div>

    <!-- ====== Three.js (使用稳定 CDN) ====== -->
    <script>
        // 检测 Three.js 是否加载成功
        window.threeLoaded = false;
        const errorDiv = document.getElementById('loading-error');
    </script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js" 
            onload="window.threeLoaded = true; errorDiv.classList.remove('active');"
            onerror="errorDiv.classList.add('active');">
    </script>

    <!-- ====== 游戏主脚本 ====== -->
    <script>
        // 等待 DOM 和 Three.js 就绪
        document.addEventListener('DOMContentLoaded', function() {
            // 如果 Three.js 未加载，显示错误并停止
            if (typeof THREE === 'undefined') {
                document.getElementById('loading-error').classList.add('active');
                return;
            }

            // ---------- DOM 引用 ----------
            const scoreSpan = document.getElementById('score-value');
            const collectSpan = document.getElementById('collect-count');
            const totalSpan = document.getElementById('total-count');
            const gameOverEl = document.getElementById('game-over');
            const resultTitle = document.getElementById('result-title');
            const resultSub = document.getElementById('result-sub');
            const finalScore = document.getElementById('final-score');
            const restartBtn = document.getElementById('restart-btn');

            // ---------- 游戏配置 ----------
            const CONFIG = {
                worldSize: 18,
                playerSize: 0.9,
                playerSpeed: 6.0,
                jumpForce: 7.5,
                gravity: -22,
                collectCount: 18,
                obstacleCount: 6,
                obstacleSpeed: 2.8,
                cameraLerp: 0.06,
            };

            // ---------- Three.js 基础 ----------
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0b0e1a);
            scene.fog = new THREE.Fog(0x0b0e1a, 25, 45);

            const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 60);
            camera.position.set(0, 14, 14);
            camera.lookAt(0, 0, 0);

            const renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.2;
            document.body.prepend(renderer.domElement);

            // ---------- 灯光 ----------
            const ambientLight = new THREE.AmbientLight(0x404066, 0.5);
            scene.add(ambientLight);

            const hemiLight = new THREE.HemisphereLight(0x87ceeb, 0x3a2a1a, 0.7);
            scene.add(hemiLight);

            const mainLight = new THREE.DirectionalLight(0xffeedd, 1.2);
            mainLight.position.set(12, 18, 8);
            mainLight.castShadow = true;
            mainLight.shadow.mapSize.width = 2048;
            mainLight.shadow.mapSize.height = 2048;
            mainLight.shadow.camera.near = 0.5;
            mainLight.shadow.camera.far = 40;
            mainLight.shadow.camera.left = -15;
            mainLight.shadow.camera.right = 15;
            mainLight.shadow.camera.top = 15;
            mainLight.shadow.camera.bottom = -15;
            mainLight.shadow.bias = -0.001;
            scene.add(mainLight);

            const fillLight = new THREE.DirectionalLight(0x4488ff, 0.3);
            fillLight.position.set(-10, 6, -8);
            scene.add(fillLight);

            const backLight = new THREE.DirectionalLight(0xff8844, 0.15);
            backLight.position.set(0, 4, -12);
            scene.add(backLight);

            // ---------- 地面 ----------
            function createGround() {
                const group = new THREE.Group();

                const groundGeo = new THREE.PlaneGeometry(CONFIG.worldSize, CONFIG.worldSize);
                const groundMat = new THREE.MeshStandardMaterial({
                    color: 0x1a1f2e,
                    roughness: 0.8,
                    metalness: 0.1,
                    side: THREE.DoubleSide,
                });
                const ground = new THREE.Mesh(groundGeo, groundMat);
                ground.rotation.x = -Math.PI / 2;
                ground.position.y = -0.05;
                ground.receiveShadow = true;
                group.add(ground);

                const gridHelper = new THREE.GridHelper(CONFIG.worldSize, 24, 0x4a5080, 0x2a3050);
                gridHelper.position.y = 0.01;
                group.add(gridHelper);

                const half = CONFIG.worldSize / 2;
                const edgeMat = new THREE.LineBasicMaterial({ color: 0x6a70a0, transparent: true, opacity: 0.25 });
                for (let i = -1; i <= 1; i += 2) {
                    for (let j = -1; j <= 1; j += 2) {
                        const pts = [
                            new THREE.Vector3(i * half, 0.02, j * half),
                            new THREE.Vector3(i * half, 0.02, -j * half),
                        ];
                        const geo = new THREE.BufferGeometry().setFromPoints(pts);
                        const line = new THREE.Line(geo, edgeMat);
                        group.add(line);
                    }
                }

                const dotMat = new THREE.PointsMaterial({
                    color: 0x6a70a0,
                    size: 0.08,
                    transparent: true,
                    opacity: 0.3,
                });
                const dotPositions = [];
                for (let i = 0; i < 120; i++) {
                    const x = (Math.random() - 0.5) * CONFIG.worldSize * 0.9;
                    const z = (Math.random() - 0.5) * CONFIG.worldSize * 0.9;
                    dotPositions.push(x, 0.02, z);
                }
                const dotGeo = new THREE.BufferGeometry();
                dotGeo.setAttribute('position', new THREE.Float32BufferAttribute(dotPositions, 3));
                const dots = new THREE.Points(dotGeo, dotMat);
                group.add(dots);

                return group;
            }
            scene.add(createGround());

            // ---------- 装饰：漂浮粒子 ----------
            const starCount = 400;
            const starGeo = new THREE.BufferGeometry();
            const starPos = new Float32Array(starCount * 3);
            for (let i = 0; i < starCount * 3; i++) {
                starPos[i] = (Math.random() - 0.5) * 60;
                starPos[i] += (i % 3 === 1) ? 5 : 0;
            }
            starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
            const starMat = new THREE.PointsMaterial({
                color: 0xaabbff,
                size: 0.06,
                transparent: true,
                opacity: 0.6,
                blending: THREE.AdditiveBlending,
            });
            const stars = new THREE.Points(starGeo, starMat);
            stars.position.y = 6;
            scene.add(stars);

            // ---------- 玩家 ----------
            const playerGroup = new THREE.Group();

            const bodyGeo = new THREE.BoxGeometry(CONFIG.playerSize, CONFIG.playerSize * 0.9, CONFIG.playerSize);
            const bodyMat = new THREE.MeshStandardMaterial({
                color: 0x4a9eff,
                roughness: 0.3,
                metalness: 0.4,
                emissive: 0x1a4a8a,
                emissiveIntensity: 0.15,
            });
            const body = new THREE.Mesh(bodyGeo, bodyMat);
            body.position.y = CONFIG.playerSize * 0.45;
            body.castShadow = true;
            playerGroup.add(body);

            const edgeGeo = new THREE.EdgesGeometry(bodyGeo);
            const edgeMat2 = new THREE.LineBasicMaterial({ color: 0x88ccff, transparent: true, opacity: 0.3 });
            const edgeLine = new THREE.LineSegments(edgeGeo, edgeMat2);
            edgeLine.position.copy(body.position);
            playerGroup.add(edgeLine);

            const headGeo = new THREE.SphereGeometry(CONFIG.playerSize * 0.28, 12, 12);
            const headMat = new THREE.MeshStandardMaterial({
                color: 0x7bbaff,
                roughness: 0.2,
                metalness: 0.3,
                emissive: 0x2a6aae,
                emissiveIntensity: 0.1,
            });
            const head = new THREE.Mesh(headGeo, headMat);
            head.position.set(0, CONFIG.playerSize * 0.9 + 0.08, 0);
            head.castShadow = true;
            playerGroup.add(head);

            const eyeMat = new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0x88ccff, emissiveIntensity: 0.2 });
            const pupilMat = new THREE.MeshStandardMaterial({ color: 0x0b0e1a });
            for (let side of [-1, 1]) {
                const eye = new THREE.Mesh(new THREE.SphereGeometry(0.08, 8, 8), eyeMat);
                eye.position.set(side * 0.2, CONFIG.playerSize * 0.92 + 0.08, CONFIG.playerSize * 0.28);
                playerGroup.add(eye);
                const pupil = new THREE.Mesh(new THREE.SphereGeometry(0.04, 8, 8), pupilMat);
                pupil.position.set(side * 0.25, CONFIG.playerSize * 0.92 + 0.08, CONFIG.playerSize * 0.34);
                playerGroup.add(pupil);
            }

            playerGroup.position.set(0, 0, 0);
            scene.add(playerGroup);

            // 玩家物理状态
            const player = {
                mesh: playerGroup,
                velocity: new THREE.Vector3(0, 0, 0),
                onGround: false,
                targetPos: new THREE.Vector3(0, 0, 0),
                y: 0,
            };

            // ---------- 收集物 ----------
            const collectibles = [];
            const collectibleGroup = new THREE.Group();
            scene.add(collectibleGroup);

            function createCollectible() {
                const size = 0.35 + Math.random() * 0.15;
                const geo = new THREE.OctahedronGeometry(size, 1);
                const hue = 0.10 + Math.random() * 0.08;
                const color = new THREE.Color().setHSL(hue, 0.9, 0.6);
                const mat = new THREE.MeshStandardMaterial({
                    color: color,
                    roughness: 0.2,
                    metalness: 0.7,
                    emissive: color,
                    emissiveIntensity: 0.15,
                });
                const mesh = new THREE.Mesh(geo, mat);
                mesh.castShadow = true;

                const glowGeo = new THREE.SphereGeometry(size * 1.6, 8, 8);
                const glowMat = new THREE.MeshBasicMaterial({
                    color: color,
                    transparent: true,
                    opacity: 0.08,
                    blending: THREE.AdditiveBlending,
                });
                const glow = new THREE.Mesh(glowGeo, glowMat);
                mesh.add(glow);

                const half = CONFIG.worldSize / 2 - 1.2;
                let x, z, valid;
                let attempts = 0;
                do {
                    x = (Math.random() - 0.5) * half * 2;
                    z = (Math.random() - 0.5) * half * 2;
                    valid = true;
                    if (Math.abs(x) < 2.5 && Math.abs(z) < 2.5) valid = false;
                    for (const c of collectibles) {
                        if (c.mesh.position.distanceTo(new THREE.Vector3(x, 0, z)) < 1.2) {
                            valid = false;
                            break;
                        }
                    }
                    attempts++;
                } while (!valid && attempts < 50);

                mesh.position.set(x, 0.6 + Math.random() * 0.3, z);
                mesh.userData = {
                    floatPhase: Math.random() * Math.PI * 2,
                    rotSpeed: 1.5 + Math.random() * 1.5,
                    floatSpeed: 0.8 + Math.random() * 0.6,
                    floatAmp: 0.12 + Math.random() * 0.08,
                    baseY: 0.6 + Math.random() * 0.3,
                };
                return mesh;
            }

            function spawnCollectibles(count) {
                while (collectibleGroup.children.length) {
                    const child = collectibleGroup.children[0];
                    child.geometry.dispose();
                    if (Array.isArray(child.material)) child.material.forEach(m => m.dispose());
                    else child.material.dispose();
                    collectibleGroup.remove(child);
                }
                collectibles.length = 0;

                for (let i = 0; i < count; i++) {
                    const mesh = createCollectible();
                    collectibleGroup.add(mesh);
                    collectibles.push(mesh);
                }
                totalSpan.textContent = count;
                updateCollectUI();
            }

            // ---------- 障碍物 ----------
            const obstacles = [];
            const obstacleGroup = new THREE.Group();
            scene.add(obstacleGroup);

            function createObstacle() {
                const size = 0.7 + Math.random() * 0.4;
                const geo = new THREE.BoxGeometry(size, size * 1.2, size);
                const hue = 0.0 + Math.random() * 0.03;
                const color = new THREE.Color().setHSL(hue, 0.8, 0.5);
                const mat = new THREE.MeshStandardMaterial({
                    color: color,
                    roughness: 0.4,
                    metalness: 0.3,
                    emissive: color,
                    emissiveIntensity: 0.1,
                });
                const mesh = new THREE.Mesh(geo, mat);
                mesh.castShadow = true;

                const ringGeo = new THREE.RingGeometry(size * 0.7, size * 0.9, 24);
                const ringMat = new THREE.MeshBasicMaterial({
                    color: 0xff4444,
                    transparent: true,
                    opacity: 0.15,
                    side: THREE.DoubleSide,
                    blending: THREE.AdditiveBlending,
                });
                const ring = new THREE.Mesh(ringGeo, ringMat);
                ring.rotation.x = -Math.PI / 2;
                ring.position.y = -size * 0.1;
                mesh.add(ring);

                const half = CONFIG.worldSize / 2 - 1.5;
                let x, z, valid;
                let attempts = 0;
                do {
                    x = (Math.random() - 0.5) * half * 2;
                    z = (Math.random() - 0.5) * half * 2;
                    valid = true;
                    if (Math.abs(x) < 3 && Math.abs(z) < 3) valid = false;
                    for (const o of obstacles) {
                        if (o.mesh.position.distanceTo(new THREE.Vector3(x, 0, z)) < 2.0) {
                            valid = false;
                            break;
                        }
                    }
                    attempts++;
                } while (!valid && attempts < 50);

                mesh.position.set(x, size * 0.6, z);

                const angle = Math.random() * Math.PI * 2;
                const speed = CONFIG.obstacleSpeed * (0.6 + Math.random() * 0.6);
                const range = 2.0 + Math.random() * 3.0;

                mesh.userData = {
                    dir: new THREE.Vector3(Math.cos(angle), 0, Math.sin(angle)),
                    speed: speed,
                    range: range,
                    origin: new THREE.Vector3(x, 0, z),
                    phase: Math.random() * Math.PI * 2,
                    rotSpeed: 1.0 + Math.random() * 2.0,
                };
                return mesh;
            }

            function spawnObstacles(count) {
                while (obstacleGroup.children.length) {
                    const child = obstacleGroup.children[0];
                    child.geometry.dispose();
                    if (Array.isArray(child.material)) child.material.forEach(m => m.dispose());
                    else child.material.dispose();
                    obstacleGroup.remove(child);
                }
                obstacles.length = 0;

                for (let i = 0; i < count; i++) {
                    const mesh = createObstacle();
                    obstacleGroup.add(mesh);
                    obstacles.push(mesh);
                }
            }

            // ---------- 粒子爆炸效果 ----------
            const particles = [];
            const particleGroup = new THREE.Group();
            scene.add(particleGroup);

            function emitParticles(position, color, count = 28) {
                const colors = [color, new THREE.Color().setHSL(color.getHSL({}).h, 0.8, 0.8)];
                for (let i = 0; i < count; i++) {
                    const size = 0.08 + Math.random() * 0.15;
                    const geo = new THREE.SphereGeometry(size, 6, 6);
                    const mat = new THREE.MeshBasicMaterial({
                        color: colors[Math.floor(Math.random() * colors.length)],
                        transparent: true,
                        opacity: 1,
                    });
                    const mesh = new THREE.Mesh(geo, mat);
                    mesh.position.copy(position);
                    mesh.position.x += (Math.random() - 0.5) * 0.2;
                    mesh.position.z += (Math.random() - 0.5) * 0.2;
                    const dir = new THREE.Vector3(
                        (Math.random() - 0.5) * 8,
                        Math.random() * 6 + 2,
                        (Math.random() - 0.5) * 8
                    ).normalize().multiplyScalar(2 + Math.random() * 3);
                    mesh.userData = {
                        vel: dir,
                        life: 1.0,
                        decay: 0.6 + Math.random() * 0.6,
                    };
                    particleGroup.add(mesh);
                    particles.push(mesh);
                }
            }

            // ---------- 游戏状态 ----------
            let gameState = 'playing';
            let score = 0;
            let collectedCount = 0;
            let totalCollectibles = CONFIG.collectCount;

            const keys = { w: false, a: false, s: false, d: false, space: false };

            // ---------- 重置游戏 ----------
            function resetGame() {
                playerGroup.position.set(0, 0, 0);
                player.velocity.set(0, 0, 0);
                player.onGround = false;
                player.y = 0;

                score = 0;
                collectedCount = 0;
                updateScoreUI();
                updateCollectUI();

                spawnCollectibles(CONFIG.collectCount);
                totalCollectibles = CONFIG.collectCount;
                spawnObstacles(CONFIG.obstacleCount);

                while (particleGroup.children.length) {
                    const c = particleGroup.children[0];
                    c.geometry.dispose();
                    c.material.dispose();
                    particleGroup.remove(c);
                }
                particles.length = 0;

                gameOverEl.classList.remove('active');
                gameOverEl.classList.remove('win');
                gameState = 'playing';

                camera.position.set(0, 14, 14);
                camera.lookAt(0, 0, 0);
            }

            // ---------- UI 更新 ----------
            function updateScoreUI() {
                scoreSpan.textContent = score;
            }

            function updateCollectUI() {
                collectSpan.textContent = collectedCount;
                totalSpan.textContent = totalCollectibles;
            }

            function showGameOver(won = false) {
                gameState = won ? 'win' : 'gameover';
                gameOverEl.classList.add('active');
                if (won) {
                    gameOverEl.classList.add('win');
                    resultTitle.textContent = '🎉 恭喜通关！';
                    resultSub.textContent = '你收集了所有能量球！';
                } else {
                    gameOverEl.classList.remove('win');
                    resultTitle.textContent = '💥 游戏结束';
                    resultSub.textContent = '别灰心，再试一次吧！';
                }
                finalScore.textContent = score;
            }

            // ---------- 碰撞检测 ----------
            function checkCollisions() {
                const pPos = playerGroup.position;
                const pSize = CONFIG.playerSize * 0.4;

                for (let i = collectibles.length - 1; i >= 0; i--) {
                    const c = collectibles[i];
                    const dist = pPos.distanceTo(c.position);
                    if (dist < pSize + 0.5) {
                        const pos = c.position.clone();
                        const col = c.material.color.clone();
                        emitParticles(pos, col, 30);
                        collectibleGroup.remove(c);
                        c.geometry.dispose();
                        c.material.dispose();
                        collectibles.splice(i, 1);
                        collectedCount++;
                        score += 10;
                        updateScoreUI();
                        updateCollectUI();

                        if (collectibles.length === 0) {
                            showGameOver(true);
                            return;
                        }
                    }
                }

                for (const o of obstacles) {
                    const dist = pPos.distanceTo(o.position);
                    const oSize = o.geometry.parameters.width * 0.4;
                    if (dist < pSize + oSize + 0.15) {
                        emitParticles(pPos, new THREE.Color(0xff4444), 40);
                        showGameOver(false);
                        return;
                    }
                }

                const half = CONFIG.worldSize / 2 - 0.5;
                if (Math.abs(pPos.x) > half) {
                    pPos.x = Math.sign(pPos.x) * half;
                    player.velocity.x = 0;
                }
                if (Math.abs(pPos.z) > half) {
                    pPos.z = Math.sign(pPos.z) * half;
                    player.velocity.z = 0;
                }
            }

            // ---------- 键盘事件 ----------
            document.addEventListener('keydown', (e) => {
                const key = e.key.toLowerCase();
                if (key === 'w' || key === 'a' || key === 's' || key === 'd') {
                    keys[key] = true;
                    e.preventDefault();
                }
                if (key === ' ' || key === 'space') {
                    keys.space = true;
                    e.preventDefault();
                    if (gameState === 'playing' && player.onGround) {
                        player.velocity.y = CONFIG.jumpForce;
                        player.onGround = false;
                    }
                }
                if (key === 'r') {
                    if (gameState === 'gameover' || gameState === 'win') {
                        resetGame();
                    }
                }
            });

            document.addEventListener('keyup', (e) => {
                const key = e.key.toLowerCase();
                if (key === 'w' || key === 'a' || key === 's' || key === 'd') {
                    keys[key] = false;
                    e.preventDefault();
                }
                if (key === ' ' || key === 'space') {
                    keys.space = false;
                    e.preventDefault();
                }
            });

            // ---------- 重启按钮 ----------
            restartBtn.addEventListener('click', resetGame);

            // ---------- 窗口尺寸自适应 ----------
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });

            // ---------- 初始化游戏 ----------
            resetGame();

            // ---------- 游戏循环 ----------
            let clock = new THREE.Clock();

            function animate() {
                requestAnimationFrame(animate);

                const delta = Math.min(clock.getDelta(), 0.05);
                const time = clock.elapsedTime;

                if (gameState === 'playing') {
                    const moveX = (keys.d ? 1 : 0) - (keys.a ? 1 : 0);
                    const moveZ = (keys.w ? 1 : 0) - (keys.s ? 1 : 0);
                    const len = Math.sqrt(moveX * moveX + moveZ * moveZ);
                    let dirX = 0,
                        dirZ = 0;
                    if (len > 0.01) {
                        dirX = moveX / len;
                        dirZ = moveZ / len;
                    }

                    const speed = CONFIG.playerSpeed;
                    const targetVx = dirX * speed;
                    const targetVz = dirZ * speed;
                    player.velocity.x += (targetVx - player.velocity.x) * Math.min(1, delta * 12);
                    player.velocity.z += (targetVz - player.velocity.z) * Math.min(1, delta * 12);

                    player.velocity.y += CONFIG.gravity * delta;

                    playerGroup.position.x += player.velocity.x * delta;
                    playerGroup.position.y += player.velocity.y * delta;
                    playerGroup.position.z += player.velocity.z * delta;

                    if (playerGroup.position.y <= 0) {
                        playerGroup.position.y = 0;
                        player.velocity.y = 0;
                        player.onGround = true;
                    }

                    if (len > 0.01) {
                        const targetAngle = Math.atan2(dirX, dirZ);
                        let currentAngle = playerGroup.rotation.y;
                        let diff = targetAngle - currentAngle;
                        while (diff > Math.PI) diff -= Math.PI * 2;
                        while (diff < -Math.PI) diff += Math.PI * 2;
                        playerGroup.rotation.y += diff * Math.min(1, delta * 10);
                    }

                    const isMoving = len > 0.01 && player.onGround;
                    if (isMoving) {
                        const bob = Math.sin(time * 12) * 0.03;
                        body.position.y = CONFIG.playerSize * 0.45 + bob;
                        head.position.y = CONFIG.playerSize * 0.9 + 0.08 + bob;
                    } else {
                        body.position.y += (CONFIG.playerSize * 0.45 - body.position.y) * 0.1;
                        head.position.y += (CONFIG.playerSize * 0.9 + 0.08 - head.position.y) * 0.1;
                    }

                    checkCollisions();

                    for (const c of collectibles) {
                        const ud = c.userData;
                        c.rotation.x += ud.rotSpeed * delta;
                        c.rotation.z += ud.rotSpeed * 0.6 * delta;
                        c.position.y = ud.baseY + Math.sin(time * ud.floatSpeed + ud.floatPhase) * ud.floatAmp;
                        const pulse = 1 + Math.sin(time * ud.floatSpeed * 0.7 + ud.floatPhase) * 0.04;
                        c.scale.set(pulse, pulse, pulse);
                    }

                    for (const o of obstacles) {
                        const ud = o.userData;
                        const t = Math.sin(time * ud.speed * 0.5 + ud.phase);
                        const offset = t * ud.range;
                        o.position.x = ud.origin.x + ud.dir.x * offset;
                        o.position.z = ud.origin.z + ud.dir.z * offset;
                        o.rotation.x += ud.rotSpeed * delta * 0.5;
                        o.rotation.z += ud.rotSpeed * delta * 0.3;
                        const ring = o.children[0];
                        if (ring) {
                            ring.material.opacity = 0.08 + Math.sin(time * 2.5 + ud.phase) * 0.06;
                        }
                    }

                    for (let i = particles.length - 1; i >= 0; i--) {
                        const p = particles[i];
                        p.position.add(p.userData.vel.clone().multiplyScalar(delta));
                        p.userData.vel.y += -4 * delta;
                        p.userData.life -= p.userData.decay * delta;
                        p.material.opacity = Math.max(0, p.userData.life);
                        const s = 0.5 + p.userData.life * 0.5;
                        p.scale.set(s, s, s);
                        if (p.userData.life <= 0) {
                            particleGroup.remove(p);
                            p.geometry.dispose();
                            p.material.dispose();
                            particles.splice(i, 1);
                        }
                    }
                }

                const targetCamPos = new THREE.Vector3(
                    playerGroup.position.x,
                    14 + playerGroup.position.y * 0.1,
                    playerGroup.position.z + 14
                );
                camera.position.lerp(targetCamPos, CONFIG.cameraLerp);
                camera.lookAt(playerGroup.position.x, playerGroup.position.y + 1.5, playerGroup.position.z);

                stars.rotation.y += delta * 0.012;

                renderer.render(scene, camera);
            }

            animate();

            // ---------- 移动端触控支持 ----------
            let touchStartX = 0,
                touchStartY = 0;
            renderer.domElement.addEventListener('touchstart', (e) => {
                const t = e.touches[0];
                touchStartX = t.clientX;
                touchStartY = t.clientY;
                if (gameState === 'playing' && player.onGround) {
                    player.velocity.y = CONFIG.jumpForce;
                    player.onGround = false;
                }
            }, { passive: true });

            renderer.domElement.addEventListener('touchmove', (e) => {
                e.preventDefault();
                const t = e.touches[0];
                const dx = t.clientX - touchStartX;
                const dy = t.clientY - touchStartY;
                const threshold = 20;
                keys.d = dx > threshold;
                keys.a = dx < -threshold;
                keys.w = dy < -threshold;
                keys.s = dy > threshold;
                if (Math.abs(dx) > threshold || Math.abs(dy) > threshold) {
                    touchStartX = t.clientX;
                    touchStartY = t.clientY;
                }
            }, { passive: false });

            renderer.domElement.addEventListener('touchend', () => {
                keys.w = false;
                keys.a = false;
                keys.s = false;
                keys.d = false;
            }, { passive: true });

            renderer.domElement.addEventListener('contextmenu', (e) => e.preventDefault());

            console.log('🎮 3D 收集大冒险已启动！');
        });
    </script>
</body>
</html>
